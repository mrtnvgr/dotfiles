// v8

// === DESKTOP ONLY ===
ppi 220
scale 256
fscale 256

audiodriver alsa
buffer 256
// ====================

startmsg 1
locale_lang en_US

auto_session_restore 1

// Ignore Android's screen padding
nosysbars 1

no_flog 1

theme
c_0 #11111B
c_1 #181825
c_2 #89B4FA
c_3 #CDD6F4
c_red #F38BA8
c_green #A6E3A1
c_blue #89DCEB
c_yellow #F9E2AF

c_btn #1E1E2E
c_pbtn #313244
c_sel #CDD6F4
c_txtback #1E1E2E
c_lstback #1E1E2E
c_scroll #1E1E2E
c_pscroll #313244
c_pateditor_bg #11111B
c_pateditor_white #CDD6F4
c_pateditor_ln #BAC2DE
c_pateditor_ctl #F9E2AF
c_pateditor_eff #F9E2AF
c_pateditor_val #89DCEB
c_pateditor_vel_low #FAB387
c_pateditor_level #CDD6F4
c_pateditor_cursor #A6ADC8
c_cgp0 #A6ADC8
c_cgp1 #F38BA8
c_cgp2 #89DCEB
c_cgp3 #F9E2AF
c_cgp4 #EBA0AC
c_cgp5 #A6E3A1
c_cgp6 #FAB387
c_cgp7 #74C7EC
c_cgp8 #F5E0DC
c_cgp9 #A6ADC8
c_layer0 #313244
c_layer1 #F38BA8
c_layer2 #A6E3A1
c_layer3 #F9E2AF
c_layer4 #89DCEB
c_layer5 #F5C2E7
c_layer6 #94E2D5
c_layer7 #CDD6F4

// Alt+Left - Previous layout
main_lt_prev "0 8e 4 "

// Alt+Right - Next layout
main_lt_next "0 8f 4 "

// Enter - Insert
main_ins "1 d 0 "
main_A2 "0 0 0 "

// Shift+= - Octave +1
main_oct_inc "0 3d 1 "
// Shift+- - Octave -1
main_oct_dec "0 2d 1 "

// Shift+F11 - Play from pattern cursor
// (makes more sense, because "Play current pattern" is F11)
main_play4 "0 8a 1 "

// Pixel font
font_s 2
no_font_upscale 1
int_font_scaling 1

// Grid step == 16 step pattern
tgrid_scale 4
tgrid_scale2 32

// Enable metronome
metronome 100

// Quantize recorded notes
rec_note_q 1

// == Settings below are added automatically by SunVox ==
